name: Feature request
description: Suggest a new capability or a non-trivial improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing need. "I'd like to X but currently have to Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Be specific about API / config surface if you have a preference.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fell short.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small tweak (config flag, new env var)
        - New feature within an existing module
        - New module / significant refactor
        - Not sure
    validations:
      required: true
