name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint-and-compile:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: ruff (non-blocking)
        continue-on-error: true
        run: ruff check --output-format=github src/ tests/ 2>/dev/null || ruff check --output-format=github src/

      - name: Python syntax check
        run: |
          python -m compileall -q src/
          python -m compileall -q tests/ 2>/dev/null || true

  package-build:
    name: Package builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build
